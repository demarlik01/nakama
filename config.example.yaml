server:
  port: 3000

slack:
  app_token: ${SLACK_APP_TOKEN}
  bot_token: ${SLACK_BOT_TOKEN}

llm:
  provider: anthropic
  defaultModel: claude-sonnet-4-20250514
  auth: setup-token

workspaces:
  root: ./workspaces
  shared: _shared

api:
  enabled: true
  port: 3001

session:
  idleTimeoutMin: 30
  maxQueueSize: 10
  autoSummaryOnDispose: true
