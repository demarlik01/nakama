server:
  port: 3000

slack:
  app_token: ${SLACK_APP_TOKEN}
  bot_token: ${SLACK_BOT_TOKEN}

llm:
  provider: anthropic
  defaultModel: claude-sonnet-4-5
  auth:
    type: api-key          # api-key | oauth
    key: ${ANTHROPIC_API_KEY}
  # Or use OAuth (run "nakama auth login"):
  # auth:
  #   type: oauth
  #   accessToken: sk-ant-oat01-...
  #   refreshToken: sk-ant-ort01-...
  #   expires: 1773354715015

workspaces:
  root: ./workspaces
  shared: _shared

api:
  enabled: true
  port: 3001

session:
  idleTimeoutMin: 30
  maxQueueSize: 10
  autoSummaryOnDispose: true
  sessionTTLDays: 30
